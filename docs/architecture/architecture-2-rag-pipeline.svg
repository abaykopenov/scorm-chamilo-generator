<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1600" viewBox="0 0 2600 1600">
  <defs>
    <style>
      .title { font: 700 54px Arial, sans-serif; fill: #0f172a; }
      .layer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 4; rx: 24; }
      .box { fill: #fff; stroke: #94a3b8; stroke-width: 3; rx: 18; }
      .ext { fill: #eff6ff; stroke: #60a5fa; stroke-width: 3; rx: 18; }
      .h { font: 700 32px Arial, sans-serif; fill: #0b1324; }
      .t { font: 500 24px Arial, sans-serif; fill: #1f2937; }
      .a { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arr); }
      .ad { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arr); stroke-dasharray: 14 10; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="2600" height="1600" fill="#fff"/>
  <text x="60" y="90" class="title">Architecture Part 2: RAG + Generation Pipeline</text>

  <rect class="layer" x="50" y="140" width="2500" height="1380"/>
  <text x="80" y="190" class="h">Pipeline</text>

  <rect class="box" x="90" y="260" width="440" height="190"/>
  <text x="120" y="320" class="h">Parser</text>
  <text x="120" y="365" class="t">pdf/docx/txt/md to text</text>
  <text x="120" y="400" class="t">with basic cleaning</text>

  <rect class="box" x="590" y="260" width="520" height="190"/>
  <text x="620" y="320" class="h">Chunker</text>
  <text x="620" y="365" class="t">Chunk size: 800-1200 chars</text>
  <text x="620" y="400" class="t">Overlap: 15-20%</text>

  <rect class="box" x="1170" y="260" width="560" height="190"/>
  <text x="1200" y="320" class="h">Embeddings Client</text>
  <text x="1200" y="365" class="t">Batches chunk text</text>
  <text x="1200" y="400" class="t">calls embedding model URL</text>

  <rect class="ext" x="1790" y="260" width="710" height="190"/>
  <text x="1820" y="320" class="h">Embedding Model Service (external)</text>
  <text x="1820" y="365" class="t">example: Ollama embeddings endpoint</text>
  <text x="1820" y="400" class="t">or dedicated embedding runtime</text>

  <rect class="box" x="90" y="600" width="600" height="190"/>
  <text x="120" y="660" class="h">Retriever</text>
  <text x="120" y="705" class="t">vector similarity search</text>
  <text x="120" y="740" class="t">filtered by selected documentIds</text>

  <rect class="box" x="760" y="600" width="640" height="190"/>
  <text x="790" y="660" class="h">Prompt Builder</text>
  <text x="790" y="705" class="t">brief + learning goals + top-K chunks</text>
  <text x="790" y="740" class="t">+ strict JSON schema instructions</text>

  <rect class="box" x="1470" y="600" width="520" height="190"/>
  <text x="1500" y="660" class="h">LLM Client</text>
  <text x="1500" y="705" class="t">sends prompt to generation URL</text>
  <text x="1500" y="740" class="t">expects JSON output</text>

  <rect class="ext" x="2060" y="600" width="440" height="190"/>
  <text x="2090" y="660" class="h">Generation Model Service</text>
  <text x="2090" y="705" class="t">qwen / llama / etc</text>
  <text x="2090" y="740" class="t">separate from web app</text>

  <rect class="box" x="90" y="940" width="970" height="210"/>
  <text x="120" y="1000" class="h">Course Builder + Normalizer</text>
  <text x="120" y="1045" class="t">maps outline -> modules/sections/SCO/screens</text>
  <text x="120" y="1080" class="t">normalizes questions/options and fallback values</text>

  <rect class="box" x="1130" y="940" width="640" height="210"/>
  <text x="1160" y="1000" class="h">Validation</text>
  <text x="1160" y="1045" class="t">schema checks, count checks,</text>
  <text x="1160" y="1080" class="t">safe fallback to template draft</text>

  <rect class="box" x="1840" y="940" width="660" height="210"/>
  <text x="1870" y="1000" class="h">Optional QA Agent (Phase 2)</text>
  <text x="1870" y="1045" class="t">grounding and coverage review</text>
  <text x="1870" y="1080" class="t">returns structured correction hints</text>

  <rect class="box" x="90" y="1250" width="2410" height="190"/>
  <text x="120" y="1310" class="h">Output</text>
  <text x="120" y="1355" class="t">validated course draft saved to course storage and opened in editor</text>
  <text x="120" y="1390" class="t">with links to source documentIds used during generation</text>

  <path class="a" d="M530 355 L590 355"/>
  <path class="a" d="M1110 355 L1170 355"/>
  <path class="a" d="M1730 355 L1790 355"/>

  <path class="a" d="M200 450 L200 600"/>
  <path class="a" d="M1020 450 L1020 600"/>
  <path class="a" d="M1600 450 L1600 600"/>

  <path class="a" d="M690 695 L760 695"/>
  <path class="a" d="M1400 695 L1470 695"/>
  <path class="a" d="M1990 695 L2060 695"/>

  <path class="a" d="M420 790 L420 940"/>
  <path class="a" d="M1350 790 L1350 940"/>
  <path class="a" d="M1670 1045 L1840 1045"/>

  <path class="a" d="M580 1150 L580 1250"/>
  <path class="a" d="M1450 1150 L1450 1250"/>

  <path class="ad" d="M2170 940 L2170 850 L1450 850"/>
</svg>
