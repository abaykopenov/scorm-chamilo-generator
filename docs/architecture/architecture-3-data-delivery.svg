<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1500" viewBox="0 0 2600 1500">
  <defs>
    <style>
      .title { font: 700 54px Arial, sans-serif; fill: #0f172a; }
      .layer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 4; rx: 24; }
      .store { fill: #f0fdf4; stroke: #22c55e; stroke-width: 3; rx: 18; }
      .box { fill: #fff; stroke: #94a3b8; stroke-width: 3; rx: 18; }
      .ext { fill: #eff6ff; stroke: #60a5fa; stroke-width: 3; rx: 18; }
      .h { font: 700 32px Arial, sans-serif; fill: #0b1324; }
      .t { font: 500 24px Arial, sans-serif; fill: #1f2937; }
      .a { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="2600" height="1500" fill="#fff"/>
  <text x="60" y="90" class="title">Architecture Part 3: Data + Delivery</text>

  <rect class="layer" x="50" y="140" width="2500" height="720"/>
  <text x="80" y="190" class="h">Data Layer</text>

  <rect class="store" x="90" y="260" width="560" height="220"/>
  <text x="120" y="320" class="h">Local Material Files</text>
  <text x="120" y="365" class="t">Path: .data/materials</text>
  <text x="120" y="400" class="t">binary source documents</text>

  <rect class="store" x="690" y="260" width="560" height="220"/>
  <text x="720" y="320" class="h">Metadata DB</text>
  <text x="720" y="365" class="t">docId, chunkId, sha256, status,</text>
  <text x="720" y="400" class="t">mime, size, timestamps</text>

  <rect class="store" x="1290" y="260" width="560" height="220"/>
  <text x="1320" y="320" class="h">Vector DB</text>
  <text x="1320" y="365" class="t">embeddings + chunk payload</text>
  <text x="1320" y="400" class="t">Qdrant or pgvector</text>

  <rect class="store" x="1890" y="260" width="620" height="220"/>
  <text x="1920" y="320" class="h">Course / Export Storage</text>
  <text x="1920" y="365" class="t">.data/courses and .data/exports</text>
  <text x="1920" y="400" class="t">course JSON and SCORM ZIP archives</text>

  <rect class="box" x="90" y="560" width="740" height="240"/>
  <text x="120" y="620" class="h">Retention + Governance</text>
  <text x="120" y="665" class="t">file deduplication by hash</text>
  <text x="120" y="700" class="t">size/type limits and indexing status</text>
  <text x="120" y="735" class="t">source-to-course traceability</text>

  <rect class="box" x="880" y="560" width="760" height="240"/>
  <text x="910" y="620" class="h">Operational Controls</text>
  <text x="910" y="665" class="t">health checks for model endpoints</text>
  <text x="910" y="700" class="t">timeouts, retries, fallback strategy</text>
  <text x="910" y="735" class="t">basic audit logs for generation</text>

  <rect class="ext" x="1690" y="560" width="820" height="240"/>
  <text x="1720" y="620" class="h">External Model Runtimes</text>
  <text x="1720" y="665" class="t">Generation model URL (LLM)</text>
  <text x="1720" y="700" class="t">Embedding model URL</text>
  <text x="1720" y="735" class="t">Both kept outside Next.js process</text>

  <rect class="layer" x="50" y="910" width="2500" height="530"/>
  <text x="80" y="960" class="h">Delivery Layer</text>

  <rect class="box" x="90" y="1040" width="560" height="250"/>
  <text x="120" y="1100" class="h">Course Draft</text>
  <text x="120" y="1145" class="t">validated course JSON</text>
  <text x="120" y="1180" class="t">in .data/courses</text>

  <rect class="box" x="710" y="1040" width="760" height="250"/>
  <text x="740" y="1100" class="h">SCORM Package Builder</text>
  <text x="740" y="1145" class="t">manifest + SCO html + runtime assets</text>
  <text x="740" y="1180" class="t">produces downloadable ZIP</text>

  <rect class="ext" x="1530" y="1040" width="980" height="250"/>
  <text x="1560" y="1100" class="h">Chamilo LMS</text>
  <text x="1560" y="1145" class="t">connect + upload SCORM via form flow</text>
  <text x="1560" y="1180" class="t">course publication endpoint</text>

  <path class="a" d="M650 370 L690 370"/>
  <path class="a" d="M1250 370 L1290 370"/>
  <path class="a" d="M1850 370 L1890 370"/>

  <path class="a" d="M420 480 L420 560"/>
  <path class="a" d="M980 480 L980 560"/>
  <path class="a" d="M1980 480 L1980 560"/>

  <path class="a" d="M370 1290 L370 1360"/>
  <path class="a" d="M650 1165 L710 1165"/>
  <path class="a" d="M1470 1165 L1530 1165"/>
</svg>
